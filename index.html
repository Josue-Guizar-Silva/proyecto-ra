<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 150;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="miMural" src="aldo.jpeg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#miMural" 
                 position="0 0 0.1" 
                 rotation="0 0 0" 
                 width="3" 
                 height="2.4"
                 material="shader: flat; color: #FFFFFF;"
                 animation="property: position; to: 0 0.1 0.1; dir: alternate; dur: 2000; loop: true">
        </a-image>

        <a-entity id="resaltes3D" position="0 0 0.2">
          
          <a-cone color="#00FFFF" radius-bottom="0.1" radius-top="0.01" height="0.5" position="-0.8 0.6 0.2" rotation="90 0 0" material="shader: flat;"></a-cone>
          <a-cone color="#00FFFF" radius-bottom="0.1" radius-top="0.01" height="0.5" position="0.8 0.6 0.2" rotation="90 0 0" material="shader: flat;"></a-cone>
          
          <a-sphere color="#FF0000" radius="0.05" position="-0.2 0.3 0.2" material="shader: flat;"></a-sphere>
          <a-sphere color="#FF0000" radius="0.05" position="0.2 0.3 0.2" material="shader: flat;"></a-sphere>

        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
