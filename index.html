<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('arrastrable', {
        init: function () {
          var el = this.el;
          var scene = el.sceneEl;
          var isDragging = false;
          var previousPosition = { x: 0, y: 0 };

          scene.addEventListener('touchstart', function (event) {
            isDragging = true;
            previousPosition = { x: event.touches[0].screenX, y: event.touches[0].screenY };
          });

          scene.addEventListener('touchmove', function (event) {
            if (!isDragging) return;
            var deltaMove = {
              x: event.touches[0].screenX - previousPosition.x,
              y: event.touches[0].screenY - previousPosition.y
            };
            var currentPos = el.getAttribute('position');
            
            el.setAttribute('position', {
              x: currentPos.x + (deltaMove.x * 0.005),
              y: currentPos.y - (deltaMove.y * 0.005),
              z: currentPos.z
            });
            previousPosition = { x: event.touches[0].screenX, y: event.touches[0].screenY };
          });

          scene.addEventListener('touchend', function () {
            isDragging = false;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.0001; missTolerance: 150;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="muralFondo" src="aldo.jpeg">
        <img id="personasRecortadas" src="personas.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#muralFondo" position="0 0 0" width="3" height="2.4" material="shader: flat; color: #FFFFFF;"></a-image>

        <a-image src="#personasRecortadas" arrastrable position="0 0 0.2" width="3" height="2.4" material="shader: flat; color: #FFFFFF;"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
