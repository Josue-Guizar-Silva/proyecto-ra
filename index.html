<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      // Componente unificado para arrastrar (1 dedo) y hacer zoom (2 dedos)
      AFRAME.registerComponent('interactivo', {
        init: function () {
          var el = this.el;
          var scene = el.sceneEl;
          
          // Variables para mover
          var isDragging = false;
          var previousPosition = { x: 0, y: 0 };
          
          // Variables para zoom
          var isPinching = false;
          var initialDistance = 0;
          var initialScale = { x: 1, y: 1, z: 1 };

          scene.addEventListener('touchstart', function (event) {
            if (event.touches.length === 1) {
              // Si toca con un dedo, activa el movimiento
              isDragging = true;
              isPinching = false;
              previousPosition = { x: event.touches[0].screenX, y: event.touches[0].screenY };
            } else if (event.touches.length === 2) {
              // Si toca con dos dedos, activa el zoom
              isDragging = false; 
              isPinching = true;
              var dx = event.touches[0].screenX - event.touches[1].screenX;
              var dy = event.touches[0].screenY - event.touches[1].screenY;
              initialDistance = Math.sqrt(dx * dx + dy * dy);
              initialScale = el.getAttribute('scale') || { x: 1, y: 1, z: 1 };
            }
          });

          scene.addEventListener('touchmove', function (event) {
            if (isDragging && event.touches.length === 1) {
              // Mover
              var deltaMove = {
                x: event.touches[0].screenX - previousPosition.x,
                y: event.touches[0].screenY - previousPosition.y
              };
              var currentPos = el.getAttribute('position');
              
              el.setAttribute('position', {
                x: currentPos.x + (deltaMove.x * 0.005),
                y: currentPos.y - (deltaMove.y * 0.005),
                z: currentPos.z
              });
              previousPosition = { x: event.touches[0].screenX, y: event.touches[0].screenY };
            } else if (isPinching && event.touches.length === 2) {
              // Hacer zoom
              var dx = event.touches[0].screenX - event.touches[1].screenX;
              var dy = event.touches[0].screenY - event.touches[1].screenY;
              var currentDistance = Math.sqrt(dx * dx + dy * dy);
              
              var scaleFactor = currentDistance / initialDistance;
              
              el.setAttribute('scale', {
                x: initialScale.x * scaleFactor,
                y: initialScale.y * scaleFactor,
                z: initialScale.z * scaleFactor
              });
            }
          });

          scene.addEventListener('touchend', function (event) {
            if (event.touches.length < 2) {
              isPinching = false;
            }
            if (event.touches.length === 0) {
              isDragging = false;
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <!-- Estabilización alta y 5 segundos de retardo -->
    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.0001; missTolerance: 150;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="muralFondo" src="aldo.jpeg">
        <img id="personasRecortadas" src="personas.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- Capa base (Fondo) -->
        <a-image src="#muralFondo" position="0 0 0" width="3" height="2.4" material="shader: flat; color: #FFFFFF;"></a-image>

        <!-- Capa interactiva: Se usa "interactivo" para mover y hacer zoom -->
        <a-image src="#personasRecortadas" interactivo position="0 0 0.2" scale="1 1 1" width="3" height="2.4" material="shader: flat; color: #FFFFFF;"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
